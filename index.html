<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <!-- Блок для отображения сообщения о загрузке комментариев -->
    <div id="loading-message" class="loading-message" style="display: none;">Загрузка комментариев...</div>

    <ul id="list" class="comments">
      <!-- Сюда будут добавляться комментарии -->
    </ul>
    <!-- Блок для отображения сообщения о добавлении комментария -->
    <div id="adding-message" class="adding-message" style="display: none;">Комментарий добавляется...</div>
    <div class="add-form">
      <input id="input-name" type="text" class="add-form-name" placeholder="Введите ваше имя" />
      <textarea id="input-comment" type="textarea" class="add-form-text" placeholder="Введите ваш комментарий" rows="4"></textarea>
      <div class="add-form-row">
        <button id="write" class="add-form-button disabled">Написать</button>
      </div>
    </div>
  </div>
</body>
<script type = "module" src="/main.js"></script>
</html>
